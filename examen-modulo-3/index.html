<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="CloudNova S.A.S - Bienvenida al nuevo proyecto interno.">
	<title>CloudNova S.A.S | Bienvenida</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #f4f6ee;
			--surface: #fdfcf7cc;
			--text: #102a23;
			--muted: #45635a;
			--accent: #0f766e;
			--accent-strong: #0b4f4a;
			--ring: #f59e0b;
			--card-shadow: 0 18px 60px rgba(16, 42, 35, 0.16);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Space Grotesk", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 12% 18%, #d9f99d66 0%, transparent 42%),
				radial-gradient(circle at 90% 12%, #99f6e466 0%, transparent 40%),
				linear-gradient(165deg, #eef8f0 0%, var(--bg) 55%, #e2f5eb 100%);
			display: grid;
			place-items: center;
			padding: 2rem 1rem;
			overflow-x: hidden;
		}

		.shell {
			width: min(960px, 100%);
			background: var(--surface);
			border: 1px solid #ffffffb3;
			border-radius: 24px;
			box-shadow: var(--card-shadow);
			backdrop-filter: blur(8px);
			padding: clamp(1.5rem, 2.2vw + 1rem, 3rem);
			position: relative;
			isolation: isolate;
			animation: reveal 700ms ease-out both;
		}

		.shell::before,
		.shell::after {
			content: "";
			position: absolute;
			z-index: -1;
			border-radius: 999px;
			filter: blur(26px);
			opacity: 0.8;
		}

		.shell::before {
			width: 180px;
			height: 180px;
			background: #34d39966;
			top: -48px;
			right: -40px;
		}

		.shell::after {
			width: 200px;
			height: 200px;
			background: #f59e0b4d;
			bottom: -60px;
			left: -36px;
		}

		.badge {
			display: inline-flex;
			align-items: center;
			gap: 0.45rem;
			border-radius: 999px;
			border: 1px solid #0f766e40;
			background: #ffffffbf;
			color: var(--accent-strong);
			padding: 0.35rem 0.8rem;
			font-size: 0.88rem;
			font-weight: 700;
			letter-spacing: 0.03em;
			text-transform: uppercase;
			margin-bottom: 1.15rem;
		}

		h1 {
			font-family: "Manrope", "Segoe UI", sans-serif;
			font-size: clamp(2rem, 3.7vw + 0.8rem, 4rem);
			line-height: 1.08;
			margin-bottom: 1rem;
			max-width: 20ch;
			text-wrap: balance;
		}

		.highlight {
			color: var(--accent-strong);
			position: relative;
			white-space: nowrap;
		}

		.highlight::after {
			content: "";
			position: absolute;
			left: 0;
			bottom: 0.1em;
			width: 100%;
			height: 0.33em;
			background: #86efac99;
			z-index: -1;
			border-radius: 8px;
		}

		.lead {
			color: var(--muted);
			font-size: clamp(1rem, 1.2vw + 0.6rem, 1.2rem);
			line-height: 1.65;
			max-width: 58ch;
			margin-bottom: 1.8rem;
			animation: slide-up 700ms 160ms both;
		}

		.grid {
			display: grid;
			gap: 0.9rem;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			animation: slide-up 700ms 260ms both;
			margin-bottom: 1.8rem;
		}

		.item {
			border-radius: 14px;
			border: 1px solid #0f766e2e;
			background: #ffffffd9;
			padding: 0.95rem;
		}

		.item strong {
			display: block;
			font-size: 1rem;
			margin-bottom: 0.35rem;
			color: var(--accent-strong);
		}

		.item span {
			color: var(--muted);
			font-size: 0.94rem;
			line-height: 1.45;
		}

		.actions {
			display: flex;
			flex-wrap: wrap;
			gap: 0.8rem;
			animation: slide-up 700ms 340ms both;
		}

		.btn {
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.45rem;
			padding: 0.85rem 1.1rem;
			border-radius: 12px;
			font-weight: 700;
			border: 2px solid transparent;
			transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
			will-change: transform;
		}

		.btn-primary {
			background: var(--accent);
			color: #f5fffd;
			box-shadow: 0 10px 24px rgba(15, 118, 110, 0.3);
		}

		.btn-secondary {
			background: #ffffff;
			color: var(--accent-strong);
			border-color: #0f766e54;
		}

		.btn:hover,
		.btn:focus-visible {
			transform: translateY(-2px);
		}

		.btn-primary:hover,
		.btn-primary:focus-visible {
			background: #0c655e;
			box-shadow: 0 12px 28px rgba(15, 118, 110, 0.38);
		}

		.btn-secondary:hover,
		.btn-secondary:focus-visible {
			background: #ebfbf7;
		}

		a:focus-visible {
			outline: 3px solid var(--ring);
			outline-offset: 2px;
		}

		footer {
			margin-top: 1.5rem;
			color: #32544b;
			font-size: 0.9rem;
			letter-spacing: 0.02em;
			animation: slide-up 700ms 420ms both;
		}

		@keyframes reveal {
			from {
				opacity: 0;
				transform: translateY(16px) scale(0.98);
			}

			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes slide-up {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 760px) {
			.grid {
				grid-template-columns: 1fr;
			}

			.actions {
				flex-direction: column;
			}

			.btn {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<main class="shell" role="main">
		<p class="badge">CloudNova S.A.S • Proyecto Interno</p>
		<h1>
			Bienvenido al
			<span class="highlight">examen Terraform</span>
		</h1>
		<p class="lead">
			Este sitio estatico fue creado para presentar la informacion solicitada en la actividad.
		</p>

		<section class="grid" aria-label="Informacion del examen">
			<article class="item">
				<strong>Nombre del estudiante</strong>
				<span>Brando Montoya Jaramillo</span>
			</article>
			<article class="item">
				<strong>Fecha actual</strong>
				<span id="fecha-actual">Cargando fecha...</span>
			</article>
		</section>

		<footer>
			CloudNova S.A.S © 2026 | Bienvenida al proyecto interno
		</footer>
	</main>
	<script>
		const fechaActual = new Date().toLocaleDateString("es-CO", {
			year: "numeric",
			month: "long",
			day: "numeric"
		});
		document.getElementById("fecha-actual").textContent = fechaActual;
	</script>
</body>
</html>
